<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 190" fill="none" role="img" aria-label="A cortado glass with rising steam and cardamom pods">
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- steam -->
    <g stroke="#a8703e" stroke-width="2.6" opacity="0.8">
      <path d="M98 54c-7-8-7-15 0-23 5-6 5-12 1-18"/>
      <path d="M118 52c-7-8-7-15 0-23 5-6 5-12 1-18"/>
    </g>
    <!-- glass body -->
    <path d="M76 60 L82 132 Q110 144 138 132 L144 60 Z" fill="rgba(168,112,62,0.09)" stroke="#a8703e" stroke-width="3"/>
    <ellipse cx="110" cy="60" rx="34" ry="8" fill="rgba(168,112,62,0.12)" stroke="#a8703e" stroke-width="3"/>
    <!-- crema line + milk/coffee divide -->
    <path d="M80 70q30 6 60 0" stroke="#a8703e" stroke-width="2" opacity="0.65"/>
    <path d="M83 98q27 7 54 0" stroke="#a8703e" stroke-width="2" opacity="0.5"/>
    <!-- surface line -->
    <path d="M40 150h140" stroke="#a8703e" stroke-width="2" opacity="0.45"/>
    <!-- cardamom pods -->
    <g stroke="#5c7458" stroke-width="2.2" fill="rgba(92,116,88,0.12)">
      <path d="M58 150c-5 0-8-5-8-11 0-5 3-9 8-9s8 4 8 9c0 6-3 11-8 11z"/>
      <path d="M58 133v25M58 130c0-3 2-4 4-4" fill="none"/>
      <path d="M168 152c-4 1-8-3-9-9-1-5 1-9 6-10s8 2 9 8c1 6-2 10-6 11z"/>
      <path d="M162 134l6 24" fill="none"/>
    </g>
    <!-- a couple of loose coffee beans -->
    <g stroke="#855327" stroke-width="2" fill="rgba(133,83,39,0.14)">
      <ellipse cx="86" cy="163" rx="8" ry="5" transform="rotate(-20 86 163)"/>
      <path d="M80 161q6 4 12 0" fill="none"/>
    </g>
  </g>
</svg>
