<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<meta name="color-scheme" content="light" />
<title>Nerve Media — Laptop</title>
<style>
  /* ===========================================================
     A real WebGL (Three.js) aluminium laptop in a soft studio.
     It APPEARS closed, OPENS on scroll and reveals the Nerve
     Media wordmark glowing gently on the screen, HOLDS, then
     CLOSES. A continuous loop adds an idle float, a yaw-sweep as
     it opens, and mouse parallax. No build step: Three.js loads
     via a CDN import map. Falls back to a static poster when
     WebGL / motion is off.
     =========================================================== */
  :root {
    color-scheme: light;
    /* soft studio backdrop — a gentle spotlight, not flat white */
    --backdrop: radial-gradient(125% 95% at 50% 14%,
      #ffffff 0%, #f4f6f9 38%, #e9edf2 72%, #e0e4ea 100%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e7eaef; color: #111; }
  body {
    font-family: "Archivo", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0;
    border: 0; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap;
  }

  .track { position: relative; height: 360vh; background: #e7eaef; }
  .stage {
    position: sticky; top: 0; height: 100vh; height: 100svh;
    overflow: hidden; background: var(--backdrop);
  }

  /* WebGL canvas fills the sticky stage */
  #gl { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* veil matches the backdrop for a seamless fade-in / fade-out */
  .veil {
    position: absolute; inset: 0; background: var(--backdrop);
    pointer-events: none; z-index: 2; opacity: 1;
  }

  /* static poster shown when WebGL is unavailable or the CDN fails to load */
  .poster {
    position: absolute; inset: 0; z-index: 3;
    display: none; place-items: center;
  }
  .poster-card {
    width: min(72vw, 460px); aspect-ratio: 16 / 10;
    border-radius: 16px;
    background: radial-gradient(120% 140% at 50% 30%, #17181c 0%, #0a0b0d 70%);
    display: grid; place-items: center;
    box-shadow: 0 40px 90px rgba(20, 24, 30, 0.28), inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .poster-card img {
    width: 66%; height: auto; border-radius: 8px;
    filter: drop-shadow(0 0 26px rgba(255, 255, 255, 0.18));
  }

  /* scroll hint */
  .hint {
    position: fixed; left: 50%; top: clamp(16px, 4vh, 40px);
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: #9aa0a8; font-size: 0.62rem; font-weight: 600;
    letter-spacing: 0.28em; text-transform: uppercase;
    pointer-events: none; opacity: 1; transition: opacity 480ms ease; z-index: 10;
  }
  .hint.is-hidden { opacity: 0; }
  .hint .chev {
    width: 13px; height: 13px;
    border-right: 2px solid #b8bec6; border-bottom: 2px solid #b8bec6;
    transform: rotate(45deg); animation: bob 1.8s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: rotate(45deg) translate(0,0); }
    50%     { transform: rotate(45deg) translate(2px,2px); }
  }

  /* fallback / static-frame states collapse the scroll track */
  html.is-fallback #gl,
  html.is-fallback .veil { display: none; }
  html.is-fallback .poster { display: grid; }
  html.is-fallback .track,
  html.is-static .track { height: 100vh; height: 100svh; }
  html.is-fallback .hint,
  html.is-static .hint { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .track { height: 100vh; height: 100svh; }
    .hint { display: none; }
    .chev { animation: none; }
  }
</style>
</head>
<body>
  <h1 class="sr-only">The Nerve Media laptop opens as you scroll and reveals the brand on its screen.</h1>

  <div class="hint" id="hint" aria-hidden="true">
    <span>Scroll</span>
    <span class="chev"></span>
  </div>

  <div class="track" id="track">
    <div class="stage" id="stage">
      <canvas id="gl" aria-hidden="true"></canvas>
      <div class="veil" id="veil" aria-hidden="true"></div>
      <div class="poster" id="poster" aria-hidden="true">
        <div class="poster-card">
          <img src="assets/nerve-media-logo.png" width="512" height="512" alt="Nerve Media" />
        </div>
      </div>
    </div>
  </div>

  <!-- Capability gate + boot safety net (classic script, runs before the module) -->
  <script>
  (function () {
    "use strict";
    var html = document.documentElement;
    function webglOK() {
      try {
        var c = document.createElement("canvas");
        return !!(window.WebGLRenderingContext && (c.getContext("webgl2") || c.getContext("webgl")));
      } catch (e) { return false; }
    }
    var reduce = false;
    try { reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}
    window.__laptopSupport = { webgl: webglOK(), reduce: reduce };
    window.__laptopReady = false;
    if (!window.__laptopSupport.webgl) html.classList.add("is-fallback");
    window.__bootTimer = setTimeout(function () {
      if (!window.__laptopReady) html.classList.add("is-fallback");
    }, 4500);
  })();
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from "three";
  import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
  import { RoundedBoxGeometry } from "three/addons/geometries/RoundedBoxGeometry.js";
  import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
  import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
  import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

  "use strict";
  const html = document.documentElement;
  const support = window.__laptopSupport || { webgl: true, reduce: false };
  const track = document.getElementById("track");
  const stage = document.getElementById("stage");
  const canvas = document.getElementById("gl");
  const veil = document.getElementById("veil");
  const hint = document.getElementById("hint");

  window.__laptop = { progress: 0, lidOpen: 0, reveal: 0 };

  /* ---------- math helpers ---------- */
  const clamp01 = (v) => (v < 0 ? 0 : v > 1 ? 1 : v);
  const seg = (p, a, b) => clamp01((p - a) / (b - a));
  const easeInOutCubic = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
  const lerp = (a, b, t) => a + (b - a) * t;

  /* ---------- geometry constants (world units) ---------- */
  const W = 3.0;            // laptop width
  const D = 2.0;            // deck depth
  const DECK_T = 0.09;      // deck thickness
  const LID_H = 1.9;        // lid (screen) height
  const LID_T = 0.06;       // lid thickness
  const SCREEN_W = W * 0.855;
  const SCREEN_H = LID_H * 0.78;
  const LID_CLOSED = 1.53;  // rad — lid folded flat over the keys
  const LID_OPEN = -0.20;   // rad — lid upright, reclined slightly back

  /* ---------- scene state ---------- */
  let renderer, scene, camera, bloomComposer, bloom, glowScene, glowCam;
  let laptopGroup, lidPivot, screenMat, panelMat, groundMat, keyLight, rimLight;
  const BLOOM_LAYER = 1;
  let fitDist = 9;
  const camDir = new THREE.Vector3(0.0, 0.26, 1).normalize();
  const target = new THREE.Vector3(0, 0.4, 0);
  const YAW_CLOSED = -0.5, YAW_OPEN = -0.26;              // turns toward the viewer as it opens
  const clock = new THREE.Clock();
  const ptr = { x: 0, y: 0 }, ptrTarget = { x: 0, y: 0 };  // damped mouse parallax
  let ready = false, visible = true, textureReady = false, disposed = false;
  let running = false, scrollP = 0;

  const pose = {
    appearScale: 0.9, riseY: -0.14, appear: 0,
    lidOpen: 0, dolly: 0, reveal: 0, veil: 1
  };

  /* ---------- procedural keyboard (recessed tray + individual keys) ---------- */
  function buildKeyboard(group) {
    const x0 = -W * 0.4, x1 = W * 0.4, z0 = -D * 0.3, z1 = D * 0.14;
    const cols = 14, rows = 5;
    const cellW = (x1 - x0) / cols, cellD = (z1 - z0) / rows;
    const gap = 0.16;
    const keyW = cellW * (1 - gap), keyD = cellD * (1 - gap), keyH = 0.026;

    const tray = new THREE.Mesh(
      new RoundedBoxGeometry((x1 - x0) + cellW * 0.6, 0.02, (z1 - z0) + cellD * 2.0, 3, 0.03),
      new THREE.MeshStandardMaterial({ color: 0x0c0e12, metalness: 0.4, roughness: 0.62, envMapIntensity: 0.25 }));
    tray.position.set((x0 + x1) / 2, -0.006, (z0 + z1) / 2 + cellD * 0.5);
    tray.receiveShadow = true;
    group.add(tray);

    const keyMat = new THREE.MeshStandardMaterial({ color: 0x1b1e24, metalness: 0.35, roughness: 0.52, envMapIntensity: 0.3 });
    const keyGeo = new RoundedBoxGeometry(keyW, keyH, keyD, 2, Math.min(keyW, keyD) * 0.16);
    const keys = new THREE.InstancedMesh(keyGeo, keyMat, cols * rows);
    const m = new THREE.Matrix4();
    let i = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        m.makeTranslation(x0 + cellW * (c + 0.5), keyH / 2 + 0.004, z0 + cellD * (r + 0.5));
        keys.setMatrixAt(i++, m);
      }
    }
    keys.instanceMatrix.needsUpdate = true;
    group.add(keys);

    // spacebar row in front of the grid
    const space = new THREE.Mesh(new RoundedBoxGeometry(keyW * 5.4, keyH, keyD, 2, keyD * 0.16), keyMat);
    space.position.set((x0 + x1) / 2, keyH / 2 + 0.004, z1 + cellD * 0.85);
    group.add(space);
  }

  /* ---------- build ---------- */
  function buildScene() {
    const lowPower = (window.matchMedia && matchMedia("(pointer: coarse)").matches) ||
                     ((navigator.hardwareConcurrency || 8) <= 4);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, lowPower ? 1.5 : 2));
    renderer.setClearColor(0xffffff, 0);              // transparent → studio backdrop shows through
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    scene = new THREE.Scene();
    scene.background = null;

    camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);

    // environment reflections for the aluminium — no asset weight
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    laptopGroup = new THREE.Group();
    scene.add(laptopGroup);

    const alu = new THREE.MeshStandardMaterial({ color: 0xd9dbdf, metalness: 0.92, roughness: 0.46, envMapIntensity: 0.85 });

    // deck — top surface at y=0, rear edge at z=-D/2
    const deck = new THREE.Mesh(new RoundedBoxGeometry(W, DECK_T, D, 5, 0.05), alu);
    deck.position.y = -DECK_T / 2;
    deck.castShadow = true; deck.receiveShadow = true;
    laptopGroup.add(deck);

    // keyboard + trackpad
    buildKeyboard(laptopGroup);
    const padFrame = new THREE.Mesh(new RoundedBoxGeometry(W * 0.335, 0.008, D * 0.275, 3, 0.03),
      new THREE.MeshStandardMaterial({ color: 0x9096a0, metalness: 0.5, roughness: 0.5, envMapIntensity: 0.4 }));
    padFrame.position.set(0, 0.0015, D * 0.32);
    laptopGroup.add(padFrame);
    const pad = new THREE.Mesh(new RoundedBoxGeometry(W * 0.32, 0.012, D * 0.26, 3, 0.03),
      new THREE.MeshStandardMaterial({ color: 0xcfd2d6, metalness: 0.45, roughness: 0.4, envMapIntensity: 0.7 }));
    pad.position.set(0, 0.003, D * 0.32);
    laptopGroup.add(pad);

    // hinge pivot at the shared rear edge
    lidPivot = new THREE.Group();
    lidPivot.position.set(0, 0, -D / 2);
    laptopGroup.add(lidPivot);

    // lid — geometry pushed up so its bottom edge sits on the hinge (local y=0)
    const lidGeo = new RoundedBoxGeometry(W, LID_H, LID_T, 5, 0.05);
    lidGeo.translate(0, LID_H / 2, 0);
    const lid = new THREE.Mesh(lidGeo, alu);
    lid.castShadow = true; lid.receiveShadow = true;
    lidPivot.add(lid);

    const scy = LID_H / 2;   // screen centre on the lid

    // black bezel framing the screen
    const bezel = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.9, LID_H * 0.88),
      new THREE.MeshStandardMaterial({ color: 0x0a0b0d, metalness: 0.2, roughness: 0.5, envMapIntensity: 0.2 }));
    bezel.position.set(0, scy, LID_T / 2 + 0.001);
    lid.add(bezel);

    // camera notch
    const notch = new THREE.Mesh(new THREE.CircleGeometry(0.014, 20),
      new THREE.MeshStandardMaterial({ color: 0x05060a, metalness: 0.4, roughness: 0.3, envMapIntensity: 0.3 }));
    notch.position.set(0, scy + SCREEN_H / 2 + 0.05, LID_T / 2 + 0.003);
    lid.add(notch);

    // dark glass panel — the "off" screen
    panelMat = new THREE.MeshStandardMaterial({ color: 0x04050a, metalness: 0.0, roughness: 0.55, envMapIntensity: 0.16, emissive: 0x0a0d14, emissiveIntensity: 0.04 });
    const panel = new THREE.Mesh(new THREE.PlaneGeometry(SCREEN_W, SCREEN_H), panelMat);
    panel.position.set(0, scy, LID_T / 2 + 0.002);
    lid.add(panel);

    // the wordmark — glows in on reveal (texture set once loaded)
    const side = Math.min(SCREEN_W * 0.62, SCREEN_H * 0.82);
    screenMat = new THREE.MeshStandardMaterial({
      color: 0x000000, emissive: 0xffffff, emissiveIntensity: 0,
      metalness: 0, roughness: 0.5, transparent: true, opacity: 0, depthWrite: false
    });
    const wordmark = new THREE.Mesh(new THREE.PlaneGeometry(side, side), screenMat);
    wordmark.position.set(0, scy, LID_T / 2 + 0.004);
    wordmark.layers.enable(BLOOM_LAYER);   // only this glows in the bloom pass
    lid.add(wordmark);

    // lighting
    keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(2.6, 6.0, 3.4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.near = 0.5; keyLight.shadow.camera.far = 22;
    keyLight.shadow.camera.left = -3.2; keyLight.shadow.camera.right = 3.2;
    keyLight.shadow.camera.top = 3.2; keyLight.shadow.camera.bottom = -3.2;
    keyLight.shadow.bias = -0.0006; keyLight.shadow.radius = 3;
    scene.add(keyLight);

    const fill = new THREE.DirectionalLight(0xffffff, 0.55);
    fill.position.set(-4, 2, 2.5);
    scene.add(fill);

    rimLight = new THREE.DirectionalLight(0xffffff, 1.2);
    rimLight.position.set(-1.5, 3.2, -5);
    scene.add(rimLight);

    scene.add(new THREE.HemisphereLight(0xffffff, 0xdfe2e6, 0.35));

    // soft contact shadow on a ground plane
    groundMat = new THREE.ShadowMaterial({ opacity: 0.0 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -DECK_T - 0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    // SELECTIVE bloom: render ONLY the wordmark (layer 1) on black to a bloom target,
    // then add that glow (RGB only) over the transparent base scene, so the aluminium
    // body and the studio backdrop are never touched by bloom.
    bloom = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.0 /*strength*/, 0.35 /*radius*/, 0.0 /*threshold*/);
    const bloomRP = new RenderPass(scene, camera);
    bloomRP.clearColor = new THREE.Color(0x000000);
    bloomRP.clearAlpha = 1;
    bloomComposer = new EffectComposer(renderer);
    bloomComposer.renderToScreen = false;
    bloomComposer.addPass(bloomRP);
    bloomComposer.addPass(bloom);

    glowScene = new THREE.Scene();
    glowCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const glowMat = new THREE.MeshBasicMaterial({
      map: bloomComposer.renderTarget2.texture,
      transparent: true, depthTest: false, depthWrite: false,
      blending: THREE.CustomBlending,
      blendEquation: THREE.AddEquation,
      blendSrc: THREE.OneFactor, blendDst: THREE.OneFactor,
      blendSrcAlpha: THREE.ZeroFactor, blendDstAlpha: THREE.OneFactor
    });
    glowScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), glowMat));

    // context-loss safety → poster
    canvas.addEventListener("webglcontextlost", (e) => { e.preventDefault(); html.classList.add("is-fallback"); }, false);
  }

  /* ---------- camera fit (aspect-aware → good on desktop AND mobile) ---------- */
  function computeFit() {
    laptopGroup.rotation.set(0, YAW_OPEN, 0);   // measure at the open pose (widest)
    lidPivot.rotation.x = LID_OPEN;
    laptopGroup.scale.setScalar(1);
    laptopGroup.position.set(0, 0, 0);
    laptopGroup.updateMatrixWorld(true);
    const box = new THREE.Box3().setFromObject(laptopGroup);
    const sphere = box.getBoundingSphere(new THREE.Sphere());
    target.copy(sphere.center);
    const vFov = THREE.MathUtils.degToRad(camera.fov);
    const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
    const distV = sphere.radius / Math.sin(vFov / 2);
    const distH = sphere.radius / Math.sin(hFov / 2);
    const margin = camera.aspect < 1 ? 1.18 : 1.1;   // extra breathing room in portrait
    fitDist = Math.max(distV, distH) * margin;
  }

  /* ---------- pose from scroll progress ---------- */
  function applyPose(p) {
    const enter = easeOutCubic(seg(p, 0.0, 0.18));
    const open = easeInOutCubic(seg(p, 0.18, 0.52));
    const close = easeInOutCubic(seg(p, 0.68, 1.0));

    const lidOpen = p < 0.52 ? open : p < 0.68 ? 1 : 1 - close;

    let reveal = easeOutCubic(clamp01((lidOpen - 0.62) / (1 - 0.62)));
    if (p > 0.68) reveal *= 1 - easeInOutCubic(seg(p, 0.72, 0.92));  // dark before it folds shut

    pose.appearScale = lerp(0.9, 1.0, enter);
    pose.riseY = -(1 - enter) * 0.14;
    pose.appear = enter;
    pose.lidOpen = lidOpen;
    pose.dolly = lidOpen;
    pose.reveal = reveal;
    pose.veil = Math.max(1 - enter, easeInOutCubic(seg(p, 0.95, 1.0)));

    window.__laptop.progress = p;
    window.__laptop.lidOpen = lidOpen;
    window.__laptop.reveal = reveal;

    if (hint) {
      if (p > 0.012) hint.classList.add("is-hidden");
      else hint.classList.remove("is-hidden");
    }
  }

  /* ---------- draw one frame (pose + idle + parallax + render) ---------- */
  function renderFrame(t) {
    if (!ready || disposed) return;
    const P = pose;

    // subtle life: idle float + micro rotation, scaled by how open it is
    const idleY = Math.sin(t * 0.9) * 0.015 * P.lidOpen;
    const idleRot = Math.sin(t * 0.6) * 0.012 * P.lidOpen;

    laptopGroup.scale.setScalar(P.appearScale);
    laptopGroup.position.set(0, P.riseY + idleY, 0);
    laptopGroup.rotation.y = lerp(YAW_CLOSED, YAW_OPEN, P.lidOpen) + ptr.x * 0.09 + idleRot;
    laptopGroup.rotation.x = ptr.y * -0.045;
    laptopGroup.rotation.z = idleRot * 0.35;
    lidPivot.rotation.x = LID_CLOSED + (LID_OPEN - LID_CLOSED) * P.lidOpen;

    const d = fitDist * (1 - 0.08 * P.dolly);
    camera.position.copy(camDir).multiplyScalar(d).add(target);
    camera.lookAt(target);

    if (textureReady) {
      const breathe = 1 + 0.05 * Math.sin(t * 1.4);
      screenMat.opacity = P.reveal;
      screenMat.emissiveIntensity = P.reveal * 0.62 * breathe;
    }
    panelMat.emissiveIntensity = 0.04 + P.reveal * 0.05;
    bloom.strength = P.reveal * 0.22;
    groundMat.opacity = 0.32 * P.appear * (0.5 + 0.5 * P.lidOpen);

    rimLight.intensity = 1.0 + 0.5 * P.lidOpen;
    keyLight.intensity = 2.0 + 0.3 * P.lidOpen;

    veil.style.opacity = P.veil.toFixed(3);

    // pass 1: isolated wordmark glow → bloom target (black bg)
    camera.layers.set(BLOOM_LAYER);
    bloomComposer.render();
    // pass 2: full scene straight to the transparent canvas → studio backdrop shows through
    // (reset the clear colour the bloom pass changed so the canvas clears transparent)
    camera.layers.set(0);
    renderer.setRenderTarget(null);
    renderer.setClearColor(0xffffff, 0);
    renderer.autoClear = true;
    renderer.render(scene, camera);
    // pass 3: add the confined screen glow (RGB only) on top
    renderer.autoClear = false;
    renderer.render(glowScene, glowCam);
    renderer.autoClear = true;
  }

  /* ---------- continuous animation loop (while visible) ---------- */
  function frame() {
    if (!running || disposed) return;
    applyPose(scrollP);
    ptr.x += (ptrTarget.x - ptr.x) * 0.06;      // damp parallax toward the pointer
    ptr.y += (ptrTarget.y - ptr.y) * 0.06;
    renderFrame(clock.getElapsedTime());
  }
  function startLoop() { if (running || !ready) return; running = true; renderer.setAnimationLoop(frame); }
  function stopLoop() { if (!running) return; running = false; renderer.setAnimationLoop(null); }

  function onPointerMove(e) {
    ptrTarget.x = (e.clientX / window.innerWidth) * 2 - 1;
    ptrTarget.y = (e.clientY / window.innerHeight) * 2 - 1;
  }

  /* ---------- wordmark texture (key out the dark background → clean glow) ---------- */
  function loadLogo() {
    const img = new Image();
    img.onload = () => {
      try {
        const s = 512, cv = document.createElement("canvas");
        cv.width = cv.height = s;
        const ctx = cv.getContext("2d");
        ctx.drawImage(img, 0, 0, s, s);
        const id = ctx.getImageData(0, 0, s, s), d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          const lum = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) / 255;
          const a = lum < 0.5 ? 0 : (lum - 0.5) / 0.5;       // keep bright text, drop dark bg
          d[i] = d[i + 1] = d[i + 2] = 255;
          d[i + 3] = Math.round(255 * a * (d[i + 3] / 255));
        }
        ctx.putImageData(id, 0, 0);
        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        tex.minFilter = THREE.LinearMipmapLinearFilter;
        screenMat.map = tex;
        screenMat.emissiveMap = tex;
        screenMat.needsUpdate = true;
        textureReady = true;
        if (!running) renderFrame(clock.getElapsedTime());
      } catch (e) { /* leave the screen dark on any failure */ }
    };
    img.src = "assets/nerve-media-logo.png";
  }

  /* ---------- scroll rig ---------- */
  let trackTop = 0, scrollRange = 1;
  function cacheMetrics() {
    const r = track.getBoundingClientRect();
    trackTop = r.top + (window.pageYOffset || 0);
    scrollRange = Math.max(1, track.offsetHeight - window.innerHeight);
  }
  function onScroll() {
    scrollP = clamp01(((window.pageYOffset || 0) - trackTop) / scrollRange);
  }

  let resizePending = false;
  function onResize() {
    if (resizePending) return;
    resizePending = true;
    requestAnimationFrame(() => { resizePending = false; resize(); });
  }
  function resize() {
    const w = stage.clientWidth, h = stage.clientHeight;
    renderer.setSize(w, h, false);       // false → keep CSS 100%/100% (CLS-safe, svh-correct)
    bloomComposer.setSize(w, h);
    bloom.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    computeFit();
    cacheMetrics();
    onScroll();
    if (!running) renderFrame(clock.getElapsedTime());
  }

  function observeVisibility() {
    if (!("IntersectionObserver" in window)) { visible = true; return; }
    const io = new IntersectionObserver((entries) => {
      visible = entries[0].isIntersecting;
      if (support.reduce) { if (visible) renderFrame(clock.getElapsedTime()); return; }
      if (visible && !document.hidden) startLoop(); else stopLoop();
    }, { threshold: 0 });
    io.observe(stage);
  }

  /* ---------- boot ---------- */
  function start() {
    if (!support.webgl) return;   // poster already shown by the classic guard
    buildScene();
    ready = true;
    window.__laptopReady = true;
    clearTimeout(window.__bootTimer);
    html.classList.remove("is-fallback");

    resize();
    loadLogo();
    observeVisibility();
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopLoop();
      else if (visible && !support.reduce) startLoop();
    });

    if (support.reduce) {
      html.classList.add("is-static");
      scrollP = 0.6;
      applyPose(0.6);              // a settled, fully-open frame
      visible = true;
      renderFrame(0);
    } else {
      cacheMetrics();
      onScroll();
      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", onResize);
      window.addEventListener("orientationchange", onResize);
      if (window.matchMedia && matchMedia("(pointer: fine)").matches) {
        window.addEventListener("pointermove", onPointerMove, { passive: true });
      }
      startLoop();
    }
  }

  try {
    start();
  } catch (e) {
    console.error("[laptop] init failed:", e);
    html.classList.add("is-fallback");
  }
  </script>
</body>
</html>
